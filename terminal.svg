<svg viewBox="0 0 700 470" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <style>
      .bg   { fill: #0d1117; }
      .tbar { fill: #161b22; }
      .bdr  { fill: none; stroke: #21262d; stroke-width: 1.5; }
      .div  { fill: none; stroke: #21262d; stroke-width: 1; }
      .lbl  { font-family: 'JetBrains Mono','Fira Code','Courier New',monospace; font-size: 11px; fill: #484f58; }
      .mono { font-family: 'JetBrains Mono','Fira Code','Courier New',monospace; font-size: 12.5px; }

      .c-prompt { fill: #00fff7; }
      .c-cmd    { fill: #e6edf3; }
      .c-dim    { fill: #484f58; }
      .c-muted  { fill: #8b949e; }
      .c-cyan   { fill: #00fff7; }
      .c-green  { fill: #3fb950; }
      .c-yellow { fill: #e3b341; }
      .c-orange { fill: #ff7b72; }
      .c-purple { fill: #bc8cff; }
      .c-key    { fill: #79c0ff; }
      .c-bg2    { fill: #21262d; }

      .cursor { fill: #00fff7; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .r { opacity: 0; animation: reveal .3s ease forwards; }
      @keyframes reveal { to { opacity: 1; } }

      .r00 { animation-delay: 0.1s }
      .r01 { animation-delay: 0.7s }
      .r02 { animation-delay: 1.1s }
      .r03 { animation-delay: 1.5s }
      .r04 { animation-delay: 1.8s }
      .r05 { animation-delay: 2.1s }
      .r06 { animation-delay: 2.4s }
      .r07 { animation-delay: 2.7s }
      .r08 { animation-delay: 3.0s }
      .r09 { animation-delay: 3.25s }
      .r10 { animation-delay: 3.5s }
      .r11 { animation-delay: 3.75s }
      .r12 { animation-delay: 4.0s }
      .r13 { animation-delay: 4.25s }
      .r14 { animation-delay: 4.5s }
      .r15 { animation-delay: 4.75s }
      .r16 { animation-delay: 5.0s }
      .r17 { animation-delay: 5.25s }
      .r18 { animation-delay: 5.5s }
      .r19 { animation-delay: 5.75s }
    </style>
  </defs>

  <!-- card background -->
  <rect width="700" height="470" rx="12" class="bg"/>
  <rect width="700" height="470" rx="12" class="bdr"/>

  <!-- title bar -->
  <rect width="700" height="38" rx="0" class="tbar"/>
  <rect y="37" width="700" height="1" class="div"/>
  <!-- top corners -->
  <rect width="700" height="12" rx="12" class="tbar"/>

  <!-- dots -->
  <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="19" r="6" fill="#febc2e"/>
  <circle cx="62" cy="19" r="6" fill="#28c840"/>
  <text x="90" y="23" class="lbl">vinit@dev:~  —  github-stats</text>

  <!-- terminal lines  (x=30 baseline, dy=22px per line) -->
  <!-- line 0: command -->
  <g class="r r00">
    <text x="30" y="72" class="mono c-prompt">❯ </text>
    <text x="52" y="72" class="mono c-cmd">./fetch-profile.sh --user vinitsonawane45</text>
  </g>

  <!-- line 1: connecting -->
  <g class="r r01">
    <text x="30" y="94" class="mono c-dim">  ⠿ connecting to github api...</text>
  </g>

  <!-- line 2: loaded -->
  <g class="r r02">
    <text x="30" y="116" class="mono c-green">  ✔ profile loaded  </text>
    <text x="197" y="116" class="mono c-dim">[28ms]</text>
  </g>

  <!-- box top -->
  <g class="r r03">
    <text x="30" y="146" class="mono c-cyan">  ╔══════════════════════════════════════════════╗</text>
  </g>
  <!-- box middle -->
  <g class="r r04">
    <text x="30" y="166" class="mono c-cyan">  ║  </text>
    <text x="72" y="166" class="mono c-purple">VINIT SONAWANE</text>
    <text x="182" y="166" class="mono c-dim">  ·  AI Engineer  ·  Nagpur, India  </text>
    <text x="576" y="166" class="mono c-cyan">║</text>
  </g>
  <!-- box bottom -->
  <g class="r r05">
    <text x="30" y="186" class="mono c-cyan">  ╚══════════════════════════════════════════════╝</text>
  </g>

  <!-- stack header -->
  <g class="r r06">
    <text x="30" y="216" class="mono c-dim">  ┌─ </text>
    <text x="72" y="216" class="mono c-key">stack</text>
  </g>

  <g class="r r07">
    <text x="30" y="236" class="mono c-dim">  │  languages   </text>
    <text x="172" y="236" class="mono c-orange">Python · JS · PHP · SQL</text>
  </g>
  <g class="r r08">
    <text x="30" y="256" class="mono c-dim">  │  ai / ml     </text>
    <text x="172" y="256" class="mono c-cyan">LLMs · RAG · LangGraph · PyTorch</text>
  </g>
  <g class="r r09">
    <text x="30" y="276" class="mono c-dim">  │  backend     </text>
    <text x="172" y="276" class="mono c-yellow">FastAPI · Django · Flask</text>
  </g>
  <g class="r r10">
    <text x="30" y="296" class="mono c-dim">  │  cloud       </text>
    <text x="172" y="296" class="mono c-green">AWS · GCP · Firebase · Supabase</text>
  </g>

  <!-- skills header -->
  <g class="r r11">
    <text x="30" y="326" class="mono c-dim">  ├─ </text>
    <text x="72" y="326" class="mono c-key">2026 skill radar</text>
  </g>

  <!-- skill bars -->
  <g class="r r12">
    <text x="30" y="346" class="mono c-dim">  │  LLMs &amp; Prompting  </text>
    <text x="216" y="346" class="mono c-green">████████████████████</text>
    <text x="456" y="346" class="mono c-bg2">░</text>
    <text x="468" y="346" class="mono c-green">  90%</text>
  </g>
  <g class="r r13">
    <text x="30" y="366" class="mono c-dim">  │  RAG Pipelines     </text>
    <text x="216" y="366" class="mono c-green">██████████████████</text>
    <text x="432" y="366" class="mono c-bg2">░░░</text>
    <text x="468" y="366" class="mono c-green">  80%</text>
  </g>
  <g class="r r14">
    <text x="30" y="386" class="mono c-dim">  │  LangChain/Agents  </text>
    <text x="216" y="386" class="mono c-yellow">████████████████</text>
    <text x="408" y="386" class="mono c-bg2">░░░░░</text>
    <text x="468" y="386" class="mono c-yellow">  75%</text>
  </g>
  <g class="r r15">
    <text x="30" y="406" class="mono c-dim">  │  MLOps &amp; Cloud     </text>
    <text x="216" y="406" class="mono c-yellow">██████████████</text>
    <text x="384" y="406" class="mono c-bg2">░░░░░░░</text>
    <text x="468" y="406" class="mono c-yellow">  65%</text>
  </g>
  <g class="r r16">
    <text x="30" y="426" class="mono c-dim">  │  CUDA / GPU        </text>
    <text x="216" y="426" class="mono c-orange">████████</text>
    <text x="312" y="426" class="mono c-bg2">░░░░░░░░░░░░░</text>
    <text x="468" y="426" class="mono c-orange">  40%</text>
  </g>

  <!-- final prompt + cursor -->
  <g class="r r17">
    <text x="30" y="456" class="mono c-prompt">❯ </text>
    <text x="52" y="456" class="mono c-dim">status: </text>
    <text x="120" y="456" class="mono c-green">open to opportunities</text>
    <rect x="338" y="443" width="8" height="14" class="cursor"/>
  </g>

</svg>
